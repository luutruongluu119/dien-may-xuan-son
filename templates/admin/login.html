<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Đăng nhập quản trị — {{ settings.company_name }}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="admin-body">
  <div class="login-box">
    <h1>⚙ Quản trị {{ settings.company_name }}</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="post">
      <label>Tên đăng nhập<input type="text" name="username" required autofocus></label>
      <label>Mật khẩu<input type="password" name="password" required></label>
      <button type="submit" class="btn btn-primary btn-block">Đăng nhập</button>
    </form>
  </div>
</body>
</html>
